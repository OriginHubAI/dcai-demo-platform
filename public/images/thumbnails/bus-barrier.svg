<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="225" viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-bus-barrier" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A5568;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A5568;stop-opacity:0.7" />
    </linearGradient>
    <filter id="shadow-bus-barrier" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="225" fill="url(#bg-bus-barrier)"/>
  
  <!-- Road/Scene indicator -->
  <rect x="0" y="160" width="400" height="65" fill="#1A202C" opacity="0.3"/>
  <line x1="0" y1="180" x2="400" y2="180" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="20,10" opacity="0.4"/>
  
  <!-- Object Icons -->
  
      <g transform="translate(100, 60) scale(0.9)" style="color: #ED8936">
        <rect x="15" y="45" width="90" height="60" rx="6" fill="currentColor"/><rect x="20" y="50" width="80" height="25" rx="3" fill="currentColor" opacity="0.6"/><rect x="20" y="80" width="15" height="15" rx="2" fill="#1A202C" opacity="0.3"/><circle cx="35" cy="105" r="9" fill="#1A202C"/><circle cx="85" cy="105" r="9" fill="#1A202C"/>
      </g>
    
      <g transform="translate(220, 60) scale(0.9)" style="color: #718096">
        <rect x="20" y="60" width="80" height="40" rx="3" fill="currentColor" opacity="0.8"/><rect x="30" y="65" width="60" height="8" fill="#1A202C" opacity="0.2"/><rect x="30" y="87" width="60" height="8" fill="#1A202C" opacity="0.2"/><rect x="25" y="55" width="8" height="50" rx="2" fill="currentColor"/><rect x="67" y="55" width="8" height="50" rx="2" fill="currentColor" opacity="0.9"/>
      </g>
    
  
  <!-- Scene label background -->
  <rect x="10" y="10" width="137" height="28" rx="4" fill="#1A202C" opacity="0.7"/>
  
  <!-- Object labels -->
  <text x="20" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white" letter-spacing="0.5">BUS • BARRIER</text>
  
  <!-- Bottom description hint -->
  <text x="390" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white" opacity="0.6" text-anchor="end">AutoDrive Scene</text>
</svg>