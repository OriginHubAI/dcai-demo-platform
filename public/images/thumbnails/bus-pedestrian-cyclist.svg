<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="225" viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-bus-pedestrian-cyclist" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2B6CB0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2B6CB0;stop-opacity:0.7" />
    </linearGradient>
    <filter id="shadow-bus-pedestrian-cyclist" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="225" fill="url(#bg-bus-pedestrian-cyclist)"/>
  
  <!-- Road/Scene indicator -->
  <rect x="0" y="160" width="400" height="65" fill="#1A202C" opacity="0.3"/>
  <line x1="0" y1="180" x2="400" y2="180" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="20,10" opacity="0.4"/>
  
  <!-- Object Icons -->
  
      <g transform="translate(60, 60) scale(0.7)" style="color: #F6E05E">
        <rect x="15" y="45" width="90" height="60" rx="6" fill="currentColor"/><rect x="20" y="50" width="80" height="25" rx="3" fill="currentColor" opacity="0.6"/><rect x="20" y="80" width="15" height="15" rx="2" fill="#1A202C" opacity="0.3"/><circle cx="35" cy="105" r="9" fill="#1A202C"/><circle cx="85" cy="105" r="9" fill="#1A202C"/>
      </g>
    
      <g transform="translate(180, 60) scale(0.7)" style="color: #9AE6B4">
        <circle cx="60" cy="45" r="12" fill="currentColor"/><path d="M60 60 L60 100 M60 65 L45 85 M60 65 L75 85 M45 110 L60 100 L75 110" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
      </g>
    
      <g transform="translate(300, 60) scale(0.7)" style="color: #9AE6B4">
        <circle cx="45" cy="90" r="10" fill="none" stroke="currentColor" stroke-width="4"/><circle cx="85" cy="90" r="10" fill="none" stroke="currentColor" stroke-width="4"/><path d="M45 90 L60 70 L75 70 L85 90 M60 70 L55 50 L70 50" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/><circle cx="60" cy="45" r="8" fill="currentColor"/>
      </g>
    
  
  <!-- Scene label background -->
  <rect x="10" y="10" width="164" height="28" rx="4" fill="#1A202C" opacity="0.7"/>
  
  <!-- Object labels -->
  <text x="20" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white" letter-spacing="0.5">BUS • PED • BIKE</text>
  
  <!-- Bottom description hint -->
  <text x="390" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white" opacity="0.6" text-anchor="end">AutoDrive Scene</text>
