<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="225" viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-car-pedestrian-barrier" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D3748;stop-opacity:0.7" />
    </linearGradient>
    <filter id="shadow-car-pedestrian-barrier" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="225" fill="url(#bg-car-pedestrian-barrier)"/>
  
  <!-- Road/Scene indicator -->
  <rect x="0" y="160" width="400" height="65" fill="#1A202C" opacity="0.3"/>
  <line x1="0" y1="180" x2="400" y2="180" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="20,10" opacity="0.4"/>
  
  <!-- Object Icons -->
  
      <g transform="translate(60, 60) scale(0.7)" style="color: #63B3ED">
        <rect x="30" y="70" width="60" height="35" rx="8" fill="currentColor"/><rect x="35" y="60" width="50" height="15" rx="5" fill="currentColor" opacity="0.8"/><circle cx="42" cy="105" r="8" fill="#1A202C"/><circle cx="78" cy="105" r="8" fill="#1A202C"/>
      </g>
    
      <g transform="translate(180, 60) scale(0.7)" style="color: #F687B3">
        <circle cx="60" cy="45" r="12" fill="currentColor"/><path d="M60 60 L60 100 M60 65 L45 85 M60 65 L75 85 M45 110 L60 100 L75 110" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
      </g>
    
      <g transform="translate(300, 60) scale(0.7)" style="color: #F687B3">
        <rect x="20" y="60" width="80" height="40" rx="3" fill="currentColor" opacity="0.8"/><rect x="30" y="65" width="60" height="8" fill="#1A202C" opacity="0.2"/><rect x="30" y="87" width="60" height="8" fill="#1A202C" opacity="0.2"/><rect x="25" y="55" width="8" height="50" rx="2" fill="currentColor"/><rect x="67" y="55" width="8" height="50" rx="2" fill="currentColor" opacity="0.9"/>
      </g>
    
  
  <!-- Scene label background -->
  <rect x="10" y="10" width="191" height="28" rx="4" fill="#1A202C" opacity="0.7"/>
  
  <!-- Object labels -->
  <text x="20" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white" letter-spacing="0.5">CAR • PED • BARRIER</text>
  
  <!-- Bottom description hint -->
  <text x="390" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white" opacity="0.6" text-anchor="end">AutoDrive Scene</text>
</svg>